name: Deploy to Azure

on:
  push:
    branches:
      - updated
  workflow_dispatch:

env:
  AZURE_SITE_NAME: forestloop
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Build application
        run: npm run build:azure
      
      - name: Archive build artifacts
        # Zip the CONTENTS of dist, not the folder itself, so index.html is at the root of the zip
        run: |
          cd dist
          zip -r -q ../deploy.zip .
          cd ..
      

      - name: Test credentials
        if: success()
        run: |
          echo "Testing Kudu API authentication..."
          curl -v -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/" 2>&1 | grep -E "(HTTP|401|200|credentials|authentication)" || true
          echo "Credentials test complete"

      - name: Clean wwwroot before deploy
        if: success()
        run: |
          curl -X DELETE -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/wwwroot/?recursive=true"

      - name: Deploy to Azure
        if: success()
        run: |
          echo "Starting deployment..."
          DEPLOY_RESPONSE=$(curl -X POST \
            -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            -w "\n%{http_code}" \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/zipdeploy")
          echo "Deployment Response:"
          echo "$DEPLOY_RESPONSE"
          HTTP_CODE=$(echo "$DEPLOY_RESPONSE" | tail -n 1)
          echo "HTTP Status Code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment API call completed. Waiting 10 seconds for files to be written..."
          sleep 10

      - name: List deployed files via Kudu
        if: success()
        run: |
          echo "=== Deployment Diagnostics ==="
          echo "Listing actual directory contents in wwwroot via Kudu API..."
          curl -v -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/wwwroot/"
          echo ""
          echo "Checking for index.html via Kudu..."
          curl -v -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/wwwroot/index.html" | head -c 500
          echo ""
          echo "Checking for web.config via Kudu..."
          curl -v -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/wwwroot/web.config" | head -c 500
          echo ""
          echo "Attempting to access index.html via HTTPS..."
          curl -v https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net/index.html | head -c 500
      
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Status"
          echo "- **App Name**: ${{ env.AZURE_SITE_NAME }}"
          echo "- **URL**: https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net"
          echo "- **Status**: ${{ job.status }}"
