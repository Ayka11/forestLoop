name: Deploy to Azure

on:
  push:
    branches:
      - updated
  workflow_dispatch:

env:
  AZURE_SITE_NAME: forestloop
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Build application
        run: npm run build:azure
      
      - name: Archive build artifacts
        # Zip the CONTENTS of dist, not the folder itself, so index.html is at the root of the zip
        run: |
          cd dist
          zip -r -q ../deploy.zip .
          cd ..
      

      - name: Clean wwwroot before deploy
        if: success()
        run: |
          curl -X DELETE -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/wwwroot/?recursive=true"

      - name: Deploy to Azure
        if: success()
        run: |
          echo "Starting deployment..."
          curl -X POST \
            -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/zipdeploy"
          echo "Deployment API call completed. Waiting 5 seconds for files to be written..."
          sleep 5

      - name: List deployed files via Kudu
        if: success()
        run: |
          echo "Listing actual directory contents in wwwroot via Kudu API..."
          curl -u "${{ secrets.AZURE_PUBLISH_USERNAME }}:${{ secrets.AZURE_PUBLISH_PASSWORD }}" \
            "${{ secrets.AZURE_PUBLISH_URL }}/api/vfs/site/wwwroot/" | jq '.[] | {name, type}' || echo "Failed to list directory"
          echo "Attempting to access index.html at root..."
          curl -sSf https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net/index.html | head -c 200 || echo "No index.html at root"
      
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Status"
          echo "- **App Name**: ${{ env.AZURE_SITE_NAME }}"
          echo "- **URL**: https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net"
          echo "- **Status**: ${{ job.status }}"
