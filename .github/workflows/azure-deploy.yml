name: Deploy to Azure

on:
  push:
    branches:
      - updated
  workflow_dispatch:

env:
  AZURE_SITE_NAME: forestloop
  NODE_VERSION: '22.x'
  AZURE_WEBAPP_PACKAGE_PATH: 'dist'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Build application
        run: npm run build:azure
      
      - name: Deploy to Azure App Service
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_SITE_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Verify deployment
        if: success()
        run: |
          echo "Deployment completed successfully"
          echo "App URL: https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net"
          sleep 5
          curl -s https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net/index.html | head -c 200
      
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Status"
          echo "- **App Name**: ${{ env.AZURE_SITE_NAME }}"
          echo "- **URL**: https://${{ env.AZURE_SITE_NAME }}.azurewebsites.net"
          echo "- **Status**: ${{ job.status }}"
